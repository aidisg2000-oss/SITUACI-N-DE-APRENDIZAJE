<div class="exe-text-template"><div class="textIdeviceContent">
            <div class="exe-text-activity">
                <div><p style="text-align: center;"><strong>Aprendizaje Basado en Proyectos (ABP)</strong><br>El alumnado desarrolla un producto final real y significativo: una infografía digital y un juego interactivo sobre cuentos tradicionales.</p>
<p style="text-align: center;"><strong>Aprendizaje Cooperativo</strong><br>Trabajo en pequeños grupos con reparto de roles: portavoz, lector/a, diseñador/a y coordinador/a.</p>
<p style="text-align: center;"><strong>Gamificación</strong><br>Uso del juego como herramienta de aprendizaje mediante Wordwall, retos, puntuaciones e interacción entre grupos.</p>
<p style="text-align: center;"><strong>Aprendizaje Basado en el Juego</strong><br>La adquisición de contenidos se realiza mediante dinámicas lúdicas que aumentan la motivación y la participación.</p><p class="clearfix"></p></div>
            </div></div></div>
</div>
</div>
